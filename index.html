<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">

    <title>Formulário de Convites</title>
</head>
<body>
    <div id="app">
        <main>
            <div class="main-container">
                <h1>Crie seu Convite</h1>
                <form method="post" enctype="multipart/form-data">
                    <fieldset>
                        <legend>
                        <div class="legend-wrapper">
                            <img src="assets/icons/calendar.svg" alt="">
                            Sobre o evento
                        </div>
                        </legend>

                        <div class="input-wrapper">
                            <label class="label-text" for="title">Titulo</label>
                            <input type="text" name="title" id="title" placeholder="Nome do evento">
                        </div>

                        <div class="date-wrapper">
                            <div class="input-wrapper" >
                                <label class="label-text" for="start">Início</label>
                                <input type="datetime-local" name="start" id="start" lang="pt-BR">
                            </div>
                            <div class="input-wrapper">
                                <label class="label-text" for="end">Fim</label>
                                <input class="label-text" type="datetime-local" name="end" id="end" lang="pt-BR">
                            </div>
                        </div>
                        
                         <div class="button-wrapper">
                            <div class="input-wrapper">
                            <label class="label-text" for="event-type"> Tipo</label>
                            <div class="segmented-control-group">
                                <input type="radio" id="presencial" name="event-type"  value="presencial" checked class="sr-only">
                                <label for="presencial" class="segmented-control-item">
                                <img src="assets/icons/building-2.svg" alt="">
                                Presencial</label>
                                <div class="radio-inner">
                                    <input type="radio" id="online" name="event-type"  value="online" class="sr-only">
                                    <label for="online" class="segmented-control-item">
                                    <img src="assets/icons/video.svg" alt="">
                                        Online</label>
                                </div>
                            </div>
                            </div>
                            <div class="input-wrapper">
                                <label class="label-text" for="address">Endereço</label>
                                <input type="text" name="address" id="start">
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label class="label-text" for="description">Descrição</label>
                            <textarea name="description" id="description"></textarea>
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>
                            <div class="legend-wrapper">
                                <img src="assets/icons/paintbrush-vertical.svg" alt="">
                                Personalização
                            </div>
                        </legend>

                        <label for="colors">Cor principal</label>
                        <div class="radio-wrapper-inline">
                            <input class="radio-circle" style="background-color: var(--brand-light);" type="radio">
                            <input class="radio-circle" style="background-color: var(--navy);" type="radio">
                            <input class="radio-circle" style="background-color: var(--purple);" type="radio">
                            <input class="radio-circle" style="background-color: var(--fuschia);" type="radio">
                            <input class="radio-circle" style="background-color: var(--pink);" type="radio">
                            <input class="radio-circle" style="background-color: var(--danger);" type="radio">
                            <input class="radio-circle" style="background-color: var(--orange);" type="radio">
                            <input class="radio-circle" style="background-color: var(--yellow);" type="radio">
                            <input class="radio-circle" style="background-color: var(--lime);" type="radio">
                            <input class="radio-circle" style="background-color: var(--green);" type="radio">
                            <input class="radio-circle" style="background-color: var(--cyan);" type="radio">
                        </div>

                        <div class="grid-event">
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/aniversario.png" value="birthday" id="birthday" alt="">
                                <label for="birthday">Aniversário</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/infantil.png" value="child" id="child" alt="">
                                <label for="child">Infantil</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/formatura.png" value="prom" id="prom" alt="">
                                <label for="prom">Formatura</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/casamento.png" value="wedding" id="wedding" alt="">
                                <label for="wedding">Casamento</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/cha-de-bebe.png" value="baby-shower" id="baby-shower" alt="">
                                <label for="baby-shower">Chá de Bebe</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/cha-de-panela.png" value="bridal-shower" id="bridal-shower" alt="">
                                <label for="bridal-shower">Chá de panela</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/carnaval.png" value="carnival" id="carnival" alt="">
                                <label for="carnival">Carnaval</label>
                            </div>
                            <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/pascoa.png" value="easter" id="easter" alt="">
                                <label for="easter">Páscoa</label>
                            </div>
                             <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/sao-joao.png" value="saint-john" id="saint-john" alt="">
                                <label for="saint-john">São João</label>
                            </div>
                             <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/halloween.png" value="halloween" id="halloween" alt="">
                                <label for="halloween">Halloween</label>
                            </div>
                             <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/natal.png" value="christmas" id="christmas" alt="">
                                <label for="christmas">Natal</label>
                            </div>
                             <div class="radio-inner">
                                <input type="radio" class="wrapper-event">
                                <img src="assets/images/outro.png" value="other" id="other" alt="">
                                <label for="other">Outro</label>
                            </div>
                            

                        </div>
                    </fieldset>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
